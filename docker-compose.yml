version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: accountify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: accountify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - accountify-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: accountify-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@accountify.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - accountify-network

volumes:
  postgres_data:
    driver: local

networks:
  accountify-network:
    driver: bridge
